<!DOCTYPE html>
<html lang="vi">

  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/env.js"></script>

<body class="min-h-screen flex flex-col bg-slate-50">

  <div data-partial="header"></div>

  <main class="flex-1 flex items-center justify-center px-4 py-20">
    <div class="text-center max-w-md mx-auto">

      <!-- 404 illustration -->
      <div class="mb-8 flex justify-center">
        <div class="relative">
          <div class="w-40 h-40 bg-pitch-100 rounded-full flex items-center justify-center">
            <svg class="w-20 h-20 text-pitch-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">

            </svg>
          </div>
          <div class="absolute -top-2 -right-2 w-10 h-10 bg-amber-400 rounded-full flex items-center justify-center shadow-md">
            <span class="text-white font-bold text-sm">?</span>
          </div>
        </div>
      </div>

      <!-- Error code -->
      <p class="text-8xl font-black text-pitch-200 leading-none mb-2" aria-hidden="true">404</p>

      <!-- Heading -->
      <h1 class="text-2xl font-bold text-slate-800 mb-3">
        Trang không tìm thấy
      </h1>

      <!-- Description -->
      <p class="text-slate-500 mb-8 leading-relaxed">
        Trang bạn đang tìm không tồn tại hoặc đã bị di chuyển.<br>
        Hãy quay về trang chủ và thử lại.
      </p>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a
          href="/index.html"
          class="inline-flex items-center justify-center gap-2 bg-pitch-600 text-white font-semibold px-6 py-3 rounded-xl hover:bg-pitch-700 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Về trang chủ
        </a>
        <a
          href="/fields.html"
          class="inline-flex items-center justify-center gap-2 bg-white text-pitch-700 font-semibold px-6 py-3 rounded-xl border border-pitch-200 hover:bg-pitch-50 transition-colors"

          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Đặt sân ngay
        </a>
      </div>

    </div>
  </main>

  <div data-partial="footer"></div>

  <script type="module" src="/assets/js/layout-loader.js"></script>
