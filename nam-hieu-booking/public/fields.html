<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách sân — Sân Bóng Nam Hiếu</title>
  <meta name="description" content="Danh sách sân bóng đá tại TP. Hồ Chí Minh. Chọn sân và đặt giờ chơi trực tuyến ngay hôm nay.">
  <meta property="og:title" content="Danh sách sân — Sân Bóng Nam Hiếu">
  <meta property="og:description" content="Tìm và đặt sân thể thao yêu thích chỉ trong vài bước.">
  <meta property="og:image" content="/assets/images/san-bong.jpg">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/env.js"></script>
</head>
<body class="min-h-screen flex flex-col">

  <div data-partial="header"></div>

  <main class="flex-1">

    <!-- Page hero -->
    <section class="bg-gradient-to-br from-pitch-700 to-pitch-900 text-white py-12 sm:py-16">
      <div class="section-container">
        <nav class="flex items-center gap-2 text-pitch-200 text-xs mb-4" aria-label="Breadcrumb">
          <a href="/index.html" class="hover:text-white transition-colors">Trang chủ</a>
          <span aria-hidden="true">/</span>
          <span class="text-white font-medium">Danh sách sân</span>
        </nav>
        <div class="hero-badge mb-4">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          Đặt sân trực tuyến
        </div>
        <h1 class="text-3xl sm:text-4xl font-bold mb-3">Danh sách sân bóng</h1>
        <p class="text-pitch-100 text-base max-w-xl">Chọn sân bóng yêu thích của bạn — đặt nhanh, xác nhận ngay, không cần gọi điện.</p>
      </div>
    </section>

    <!-- Filter bar -->
    <section class="bg-white border-b border-slate-100 py-5 shadow-sm sticky top-16 z-30">
      <div class="section-container">
        <div class="flex flex-wrap items-start gap-4">

          <!-- District filter -->
          <div class="flex flex-col gap-1">
            <label for="filter-district" class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Quận / Huyện</label>
            <select
              id="filter-district"
              class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-pitch-500 focus:border-transparent min-w-[160px]"
              aria-label="Lọc theo quận huyện"
            >
              <option value="">Tất cả quận</option>
            </select>
          </div>

          <!-- Capacity filter -->
          <div class="flex flex-col gap-1">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Số người</span>
            <div class="flex gap-2" role="group" aria-label="Lọc theo số người">
              <button
                type="button"
                data-capacity="5"
                class="px-3 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-700 hover:bg-pitch-100 hover:text-pitch-700 transition-colors focus:outline-none focus:ring-2 focus:ring-pitch-500"
                aria-pressed="false"
              >⚽ 5 người</button>
              <button
                type="button"
                data-capacity="7"
                class="px-3 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-700 hover:bg-pitch-100 hover:text-pitch-700 transition-colors focus:outline-none focus:ring-2 focus:ring-pitch-500"
                aria-pressed="false"
              >⚽ 7 người</button>
              <button
                type="button"
                data-capacity="11"
                class="px-3 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-700 hover:bg-pitch-100 hover:text-pitch-700 transition-colors focus:outline-none focus:ring-2 focus:ring-pitch-500"
                aria-pressed="false"
              >⚽ 11 người</button>
            </div>
          </div>

          <!-- Price range filter -->
          <div class="flex flex-col gap-1">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Giá / giờ</span>
            <div class="flex gap-3 flex-wrap" role="group" aria-label="Lọc theo khoảng giá">
              <label class="flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer">
                <input type="checkbox" data-price-range="lt200" class="rounded border-slate-300 text-pitch-600 focus:ring-pitch-500">
                Dưới 200k
              </label>
              <label class="flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer">
                <input type="checkbox" data-price-range="200to400" class="rounded border-slate-300 text-pitch-600 focus:ring-pitch-500">
                200k – 400k
              </label>
              <label class="flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer">
                <input type="checkbox" data-price-range="gt400" class="rounded border-slate-300 text-pitch-600 focus:ring-pitch-500">
                Trên 400k
              </label>
            </div>
          </div>

          <!-- Sort -->
          <div class="flex flex-col gap-1 ml-auto">
            <label for="filter-sort" class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Sắp xếp</label>
            <select
              id="filter-sort"
              class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-pitch-500 focus:border-transparent"
              aria-label="Sắp xếp danh sách sân"
            >
              <option value="">Mặc định</option>
              <option value="price_asc">Giá tăng dần</option>
              <option value="price_desc">Giá giảm dần</option>
            </select>
          </div>

        </div>
      </div>
    </section>

    <!-- Field grid section -->
    <section class="py-10 sm:py-14">
      <div class="section-container">

        <!-- Empty state (hidden by default) -->
        <div
          id="fields-empty"
          class="hidden text-center py-20"
          aria-live="polite"
          aria-label="Không có kết quả"
        >
          <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <h2 class="text-lg font-semibold text-slate-700 mb-2">Không tìm thấy sân phù hợp</h2>
          <p class="text-slate-500 text-sm">Thử điều chỉnh bộ lọc để xem thêm kết quả.</p>
        </div>

        <!-- Loading skeleton placeholder (visible on first load, replaced by JS) -->
        <div id="fields-loading" class="hidden" aria-hidden="true"></div>

        <!-- Field cards grid -->
        <div
          id="fields-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
          aria-label="Danh sách sân bóng"
          aria-live="polite"
        >
          <!-- JS renders cards here -->
        </div>

      </div>
    </section>

  </main>

  <div data-partial="footer"></div>

  <script src="/assets/js/layout-loader.js" defer></script>
  <script type="module" src="/assets/js/fields-page.js"></script>
</body>
</html>
